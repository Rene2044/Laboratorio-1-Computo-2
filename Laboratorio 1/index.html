<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cotización - Repuestos El Motorizado</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        /* CSS para el diseño (Punto 1) */
        :root {
            --primary-color: #2c3e50;
            --accent-color: #9900ff;
            --bg-color: #b5b5b5;
            --error-color: #c0392b;
            --success-color: #27ae60;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }

        #app {
            background: #ffffff;
            width: 100%;
            max-width: 800px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            border-bottom: 3px solid var(--accent-color);
            margin-bottom: 30px;
            padding-bottom: 10px;
        }

        h2 { color: var(--primary-color); margin: 0; }

        .formulario {
            display: grid;
            grid-template-columns: 1fr 1fr 100px;
            gap: 15px;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .campo { display: flex; flex-direction: column; gap: 5px; }
        
        label { font-weight: bold; color: #555; font-size: 0.9rem; }

        input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--accent-color); }

        .btn-agregar {
            grid-column: 1 / -1;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: background 0.3s;
        }

        .btn-agregar:hover:not(:disabled) { background-color: #34495e; }
        .btn-agregar:disabled { background-color: #bdc3c7; cursor: not-allowed; }

        .mensaje-error {
            background-color: #fce4e4;
            color: var(--error-color);
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border: 1px solid var(--error-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            background-color: var(--primary-color);
            color: white;
            text-align: left;
            padding: 12px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        .fila-alerta {
            color: var(--error-color);
            font-weight: bold;
        }

        .total-container {
            margin-top: 20px;
            text-align: right;
            font-size: 1.4rem;
            color: var(--primary-color);
        }

        .btn-eliminar {
            background: none;
            border: 1px solid var(--error-color);
            color: var(--error-color);
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-eliminar:hover { background: var(--error-color); color: white; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <h2>Cotizador de Repuestos "El Motorizado"</h2>
    </header>

    <form @submit.prevent="agregarProducto" class="formulario">
        <div class="campo">
            <label>Descripción del Repuesto:</label>
            <input v-model="nombre" type="text" placeholder="Ej. Pastillas de freno">
        </div>

        <div class="campo">
            <label>Precio ($):</label>
            <input v-model.number="precio" type="number" step="0.01" min="0">
        </div>

        <div class="campo">
            <label>Cant:</label>
            <input v-model.number="cantidad" type="number" min="1">
        </div>

        <button type="submit" class="btn-agregar" :disabled="!nombre">
            Agregar a Cotización
        </button>
    </form>

    <div v-if="error" class="mensaje-error">
        <strong>Error:</strong> {{ error }}
    </div>

    <div v-if="items.length > 0">
        <table>
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>P. Unitario</th>
                    <th>Cant.</th>
                    <th>Subtotal</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr v-for="(item, index) in items" :key="index">
                    <td>{{ item.nombre }}</td>
                    <td>${{ item.precio.toFixed(2) }}</td>
                    <td>{{ item.cantidad }}</td>
                    <td>${{ (item.precio * item.cantidad).toFixed(2) }}</td>
                    <td>
                        <button @click="eliminarProducto(index)" class="btn-eliminar">×</button>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="total-container">
            <strong>TOTAL: ${{ calcularTotal.toFixed(2) }}</strong>
        </div>
    </div>

    <p v-else style="text-align: center; color: #95a5a6; margin-top: 20px;">
        No hay productos registrados en esta cotización.
    </p>
</div>

<script>
    const { createApp, ref, computed } = Vue;

    createApp({
        setup() {
            // 5 Variables Reactivas (Punto 5)
            const nombre = ref('');
            const precio = ref(0);
            const cantidad = ref(1);
            const items = ref([]);
            const error = ref('');

            // Lógica para agregar y validar (Punto 6)
            const agregarProducto = () => {
                // Limpiar error previo
                error.value = '';

                // Validaciones estrictas
                if (nombre.value.trim().length < 3) {
                    error.value = "El nombre del producto debe tener al menos 3 caracteres.";
                    return;
                }
                if (precio.value <= 0) {
                    error.value = "El precio debe ser un valor positivo mayor a cero.";
                    return;
                }
                if (cantidad.value <= 0) {
                    error.value = "La cantidad mínima es 1.";
                    return;
                }

                // Guardar en la lista
                items.value.push({
                    nombre: nombre.value,
                    precio: precio.value,
                    cantidad: cantidad.value
                });

                // Resetear campos
                nombre.value = '';
                precio.value = 0;
                cantidad.value = 1;
            };

            const eliminarProducto = (index) => {
                items.value.splice(index, 1);
            };

            // Propiedad computada para el total
            const calcularTotal = computed(() => {
                return items.value.reduce((acc, obj) => acc + (obj.precio * obj.cantidad), 0);
            });

            return {
                nombre, precio, cantidad, items, error,
                agregarProducto, eliminarProducto, calcularTotal
            };
        }
    }).mount('#app');
</script>

</body>
</html>
