<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador El Motorizado - Vue.js</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --error: #e74c3c;
            --success: #27ae60;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: var(--primary);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        #app {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 700px;
        }

        h2 { text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }

        .formulario {
            display: grid;
            gap: 15px;
            margin-bottom: 30px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .campo { display: flex; flex-direction: column; }
        
        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
        }

        button {
            padding: 12px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }

        .error-msg {
            color: var(--error);
            font-weight: bold;
            background: #fdf2f2;
            padding: 10px;
            border-radius: 5px;
            border-left: 5px solid var(--error);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        th { background-color: var(--primary); color: white; }

        .alerta-roja { color: var(--error); font-weight: bold; }

        .total-row {
            font-size: 1.2rem;
            background: #f0f4f8;
        }
    </style>
</head>
<body>

<div id="app">
    <h2>Sistema de Cotización "El Motorizado"</h2>

    <form @submit.prevent="agregarAlCarrito" class="formulario">
        <div class="campo">
            <label>Descripción del Repuesto:</label>
            <input v-model="nuevoNombre" type="text" placeholder="Ej. Amortiguador trasero">
        </div>

        <div class="campo">
            <label>Precio Unitario ($):</label>
            <input v-model.number="nuevoPrecio" type="number" step="0.01">
        </div>

        <div class="campo">
            <label>Cantidad:</label>
            <input v-model.number="nuevaCantidad" type="number">
        </div>

        <button type="submit" :disabled="!nuevoNombre">Agregar Producto</button>
    </form>

    <div v-if="mensajeError" class="error-msg">
        ⚠️ {{ mensajeError }}
    </div>

    <hr>

    <div v-if="carrito.length > 0">
        <table>
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Precio</th>
                    <th>Cant.</th>
                    <th>Subtotal</th>
                </tr>
            </thead>
            <tbody>
                <tr v-for="(item, index) in carrito" :key="index">
                    <td>{{ item.nombre }}</td>
                    <td>${{ item.precio.toFixed(2) }}</td>
                    <td>{{ item.cantidad }}</td>
                    <td>${{ (item.precio * item.cantidad).toFixed(2) }}</td>
                </tr>
            </tbody>
            <tfoot>
                <tr class="total-row">
                    <td colspan="3"><strong>TOTAL A PAGAR:</strong></td>
                    <td class="alerta-roja">${{ calcularTotal.toFixed(2) }}</td>
                </tr>
            </tfoot>
        </table>
    </div>
    
    <p v-else style="text-align: center; color: #7f8c8d;">
        La lista de cotización está vacía.
    </p>
</div>

<script>
    const { createApp, ref, computed } = Vue;

    createApp({
        setup() {
            // --- 5 Variables Reactivas (Punto 5) ---
            const nuevoNombre = ref('');
            const nuevoPrecio = ref(0);
            const nuevaCantidad = ref(1);
            const carrito = ref([]);
            const mensajeError = ref('');

            // --- Lógica de Negocio ---
            const agregarAlCarrito = () => {
                // Validación (Punto 6)
                if (nuevoNombre.value.trim() === "") {
                    mensajeError.value = "El nombre no puede estar vacío.";
                    return;
                }
                if (nuevoPrecio.value <= 0 || nuevaCantidad.value <= 0) {
                    mensajeError.value = "El precio y la cantidad deben ser mayores a 0.";
                    return;
                }

                // Agregar datos procesados
                carrito.value.push({
                    nombre: nuevoNombre.value,
                    precio: nuevoPrecio.value,
                    cantidad: nuevaCantidad.value
                });

                // Resetear campos
                nuevoNombre.value = '';
                nuevoPrecio.value = 0;
                nuevaCantidad.value = 1;
                mensajeError.value = '';
            };

            // Cálculo matemático (Punto 4)
            const calcularTotal = computed(() => {
                return carrito.value.reduce((acc, item) => acc + (item.precio * item.cantidad), 0);
            });

            return {
                nuevoNombre, nuevoPrecio, nuevaCantidad, carrito, mensajeError,
                agregarAlCarrito, calcularTotal
            };
        }
    }).mount('#app');
</script>

</body>
</html>
